name: Surveillance logements CROUS Evry

on:
  workflow_dispatch:

  schedule:
    - cron: "*/1 * * * *"

permissions:
  contents: read

jobs:
  surveillance:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Récupérer les fichiers du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Installer Chromium
        run: playwright install --with-deps chromium

      - name: Vérifier les logements CROUS
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAME_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAME_CHAT_ID }}
        run: python monitor.py
